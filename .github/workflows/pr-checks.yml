name: PR checks

on:
  pull_request:
    branches: [main]
  # also re-check main itself after a merge/direct push - main is what a
  # manual prod deploy ships, so it should never sit red without anyone knowing
  push:
    branches: [main]

jobs:
  checks:
    uses: ./.github/workflows/checks.yml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: read
