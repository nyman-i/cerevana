# one canonical host: www 301s to the apex the canonical tags point at
server {
    listen 8080;
    server_name www.cerevana.com;
    return 301 https://cerevana.com$request_uri;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/manifest+json;

    location = /quadbox.html {
        return 301 /nback.html;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
}
